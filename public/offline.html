<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — PULSO UGEL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f7fa;
      color: #5d596c;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(115, 103, 240, 0.12);
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(115, 103, 240, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: #7367f0;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      color: #3a3541;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-block;
      background: #7367f0;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #6154e4; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #a8aaae;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ea5455;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
      </svg>
    </div>

    <h1>Sin conexión a internet</h1>
    <p>
      No se puede acceder a <strong>PULSO UGEL</strong> en este momento.
      Verifica tu conexión y vuelve a intentarlo.
    </p>

    <button class="btn" onclick="location.reload()">Reintentar</button>

    <div class="badge">
      <span class="dot"></span>
      <span>PULSO UGEL — Sistema de Control Interno</span>
    </div>
  </div>
</body>
</html>
